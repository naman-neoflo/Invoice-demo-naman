services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8099"
    env_file:
      - ./backend/.env
    volumes:
      - ./fixtures:/fixtures
      # Persist the SQLite cash DB across restarts
      - cash_db:/app/src/cash

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BE_BASE_URL: "https://invoicedemo-api.neoflo.ai"
        BE_BASE_URL: "https://invoicedemo-api.neoflo.ai"
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      HOSTNAME: "0.0.0.0"
      BE_BASE_URL: "https://invoicedemo-api.neoflo.ai"
      # Anthropic API key for Neo chat (/api/neo/chat)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Auth credentials (defaults match the hardcoded fallbacks in lib/auth.ts)
      AUTH_USERNAME: "${AUTH_USERNAME:-neoflo}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-n30fl0r0x0r!}"
      AUTH_SESSION_TOKEN: "${AUTH_SESSION_TOKEN:-ok-2026}"
    depends_on:
      - backend

volumes:
  cash_db:
