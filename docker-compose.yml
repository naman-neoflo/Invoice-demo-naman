services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8099:8099"
    env_file:
      - ./backend/.env
    volumes:
      - ./fixtures:/fixtures
      # Persist the SQLite cash DB across restarts
      - cash_db:/app/src/cash

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BE_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      BE_BASE_URL: "http://backend:8099"
    depends_on:
      - backend

volumes:
  cash_db:
